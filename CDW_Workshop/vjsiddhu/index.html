<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Home Screen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <div class="header-left">
            <img src="facelogo.jpg" alt="Facebook Logo" class="logo">
            <input type="text" placeholder="Search Facebook" class="search-bar">
        </div>
        <div class="header-right">
            
            <img src="usericon.jpg" alt="Profile Picture" class="profile-pic">
        </div>
    </header>

    <!-- Main Content Section -->
    <main class="main">
        <!-- Sidebar Section -->
        <aside class="sidebar">
            <ul>
                <li><i class="fas fa-user-friends"></i> Friends</li>
                <li><i class="fas fa-images"></i> Memories</li>
            </ul>
            
        </aside>

        <!-- Feed Section -->
        <section class="feed">
            <!-- Post Create Section -->
            <div class="create-post">
                <img src="usericon.jpg" alt="Profile Picture" class="profile-pic">
                <input type="text" placeholder="What's on your mind?" class="post-input">
                <img src="mailicon.png" alt="Profile Picture" class="profile-pic">
            </div>

            <!-- Post Section -->
            <div class="post">
                <div class="post-header">
                    <img src="vjlogo.jpg" alt="Profile Picture" class="post-pic">
                    <span class="profile-name">ThyView</span>
                    <span class="post-time">Follow · 31 October at 22:14</span>
                </div>
                <p class="post-content">
                    Siddhu made his television debut in 2019 with the reality game show "Killadi Rani" on Jaya TV. His YouTube channel, VJ Siddhu Vlogs, has also been well-received, with several of his videos amassing millions of views.
                </p>
                <img src="vj.jpg" alt="VJ Siddhu Home Tour" class="post-image">
                <div class="post-actions">
                    <button class="action-btn"> Like</button>
                    
                    <button class="action-btn">Share</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
